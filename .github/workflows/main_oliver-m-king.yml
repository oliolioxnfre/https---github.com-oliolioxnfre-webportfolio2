name: Build and deploy Node.js app to Azure Web App
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: npm install, build
        run: |
          npm install
          npm run build
          
      - name: Zip deployment package
        # Since everything is in the root, we zip the contents of dist
        # and include server.js and package.json if it's Linux, 
        # or just the contents of dist (containing web.config) if it's Windows.
        # To be safe for both, we zip the contents of dist and the server files.
        run: |
          cp server.js dist/ 2>/dev/null || true
          cp package.json dist/ 2>/dev/null || true
          cd dist && zip -r ../release.zip .
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'oliver-m-king'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
